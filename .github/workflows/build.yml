name: Build App Manager (Swift)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build & package "Trash Panda - App Manager.app"
        run: |
          chmod +x Scripts/build_app.sh
          ./Scripts/build_app.sh

      - name: Zip the .app
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "Trash Panda - App Manager.app" TrashPanda-AppManager-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrashPanda-AppManager-macOS
          path: dist/TrashPanda-AppManager-macOS.zip
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: TrashPanda-AppManager-macOS
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: TrashPanda-AppManager-macOS.zip
          generate_release_notes: true
